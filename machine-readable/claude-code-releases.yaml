  - version: "2.1.186"
    date: "2026-06-23"
    highlights:
      - "⭐ `claude mcp login/logout <name>` authenticates MCP servers from the CLI without the interactive `/mcp` menu; `--no-browser` flag redirects via stdin for SSH sessions"
      - "`!` bash commands now auto-trigger Claude to respond to output; opt-out via `\"respondToBashCommands\": false` in settings.json"
